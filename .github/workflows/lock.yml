name: Lock Threads

on:
  schedule:
    - cron: "0 6 1 * *"

permissions:
  issues: write
  pull-requests: write

jobs:
  lock:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: dessant/lock-threads@851cffe46851ddd2051ea7147ebdc995113241c3 # v6.0.1
        with:
          issue-inactive-days: 90
          pr-inactive-days: 90
          issue-lock-reason: resolved
