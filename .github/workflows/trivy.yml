name: Trivy Container Scan

on:
  pull_request:
    branches: [main]
    paths:
      - Dockerfile
      - pyproject.toml
      - .github/workflows/trivy.yml
  schedule:
    - cron: "0 6 * * 3"

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build image for scanning
        run: docker build -t kube-lint-mcp:scan .

      - name: Run Trivy vulnerability scanner
        id: trivy
        uses: aquasecurity/trivy-action@e368e328979b113139d6f9068e03accaed98a518 # master
        with:
          image-ref: kube-lint-mcp:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@c793b717bc78562f491db7b0e93a3a178b099162 # v4
        if: always() && steps.trivy.outcome == 'success'
        with:
          sarif_file: trivy-results.sarif
