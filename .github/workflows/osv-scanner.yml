name: OSV Scanner

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 3"

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Generate lockfile
        run: |
          pip install --dry-run --report requirements.json .
          python -c "
          import json, pathlib
          report = json.loads(pathlib.Path('requirements.json').read_text())
          lines = []
          for pkg in report.get('install', []):
              m = pkg.get('metadata', {})
              if m.get('name', '').replace('_', '-').lower() == 'kube-lint-mcp':
                  continue
              lines.append(f'{m[\"name\"]}=={m[\"version\"]}')
          pathlib.Path('requirements.txt').write_text('\n'.join(sorted(lines)) + '\n')
          "

      - name: Run OSV Scanner
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --recursive
            --format=sarif
            --output=osv-results.sarif
            .

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always() && hashFiles('osv-results.sarif') != ''
        with:
          sarif_file: osv-results.sarif
